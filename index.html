<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Nick's PokéHub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --yellow:#FFD700;--ydim:rgba(255,215,0,0.11);--red:#E3350D;--blue:#1A6FB5;
  --dark:#0f0f1a;--surface:#16162a;--card-bg:#1e1e35;
  --border:rgba(255,215,0,0.13);--border2:rgba(255,215,0,0.28);
  --text:#f0f0f0;--muted:#8888aa;--r:10px;--rl:14px;
  --fd:'Bebas Neue',sans-serif;--fb:'DM Sans',sans-serif;
}
html,body{background:var(--dark);color:var(--text);font-family:var(--fb);font-size:14px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(255,215,0,.18);border-radius:3px}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:13px 26px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;gap:14px}
.logo{font-family:var(--fd);font-size:26px;letter-spacing:2px;background:linear-gradient(135deg,#FFD700 30%,#FF6B00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.nav-tabs{display:flex;gap:4px;flex-wrap:wrap}
.nav-tab{padding:7px 16px;border-radius:20px;border:none;background:transparent;color:var(--muted);font-family:var(--fb);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.nav-tab.active{background:var(--yellow);color:#111;font-weight:600}
.nav-tab:hover:not(.active){background:var(--ydim);color:var(--yellow)}
.nav-right{display:flex;align-items:center;gap:8px}
.iBtn{position:relative;width:37px;height:37px;border-radius:50%;border:1px solid var(--border);background:var(--card-bg);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:border-color .2s}
.iBtn:hover{border-color:var(--border2)}
.badge{position:absolute;top:-2px;right:-2px;width:16px;height:16px;background:var(--red);border-radius:50%;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff}

/* PAGES */
.main{padding:22px 26px;max-width:1300px;margin:0 auto}
.page{display:none}.page.active{display:block}

/* SEARCH / FILTER */
.toolbar{display:flex;gap:8px;margin-bottom:18px;align-items:center;flex-wrap:wrap}
.toolbar input{flex:1;min-width:180px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:9px 15px;color:var(--text);font-family:var(--fb);font-size:14px;outline:none;transition:border-color .2s}
.toolbar input:focus{border-color:var(--yellow)}
.toolbar input::placeholder{color:var(--muted)}
.pill{padding:7px 15px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:var(--fb);font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
.pill.active{border-color:var(--yellow);color:var(--yellow);background:var(--ydim)}
.pill:hover:not(.active){border-color:var(--border2);color:var(--text)}

/* STATS */
.stats{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:13px;color:var(--muted)}
.stat strong{color:var(--yellow);font-weight:600}

/* CARD GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px}

.pcard{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s}
.pcard:hover{transform:translateY(-5px);border-color:rgba(255,215,0,.5);box-shadow:0 8px 28px rgba(255,215,0,.08)}
.pcard.graded{border-color:rgba(100,200,255,.25)}
.pcard.graded:hover{border-color:rgba(100,200,255,.7);box-shadow:0 8px 28px rgba(100,180,255,.1)}
.pcard.sealed{border-color:rgba(120,220,120,.2)}
.pcard.sealed:hover{border-color:rgba(120,220,120,.6);box-shadow:0 8px 28px rgba(80,200,80,.08)}

.cimg{width:100%;aspect-ratio:3/4;position:relative;overflow:hidden;background:#111;display:flex;align-items:center;justify-content:center}
.cimg img{width:100%;height:100%;object-fit:cover;object-position:top;transition:transform .3s}
.pcard:hover .cimg img{transform:scale(1.04)}
.cimg .fallback{font-size:44px;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#1a2040,#0a0f20)}

.grade-badge{position:absolute;top:7px;left:7px;background:rgba(15,15,26,.88);border:1px solid rgba(100,200,255,.4);border-radius:6px;padding:3px 7px;font-size:9px;font-weight:700;color:#7dcfff;letter-spacing:.4px;line-height:1.3;text-align:center}
.grade-score{display:block;font-size:14px;color:#fff;font-family:var(--fd);letter-spacing:0}

.sticker{position:absolute;top:7px;right:7px;padding:2px 8px;border-radius:9px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.s-sell{background:rgba(227,53,13,.88);color:#fff}
.s-trade{background:rgba(26,111,181,.88);color:#fff}
.s-both{background:rgba(255,215,0,.9);color:#111}
.s-sealed{background:rgba(80,200,80,.85);color:#111}

.cinfo{padding:9px 11px 12px}
.cname{font-family:var(--fd);font-size:16px;letter-spacing:.4px;color:var(--text);margin-bottom:1px;line-height:1.1}
.cset{font-size:10px;color:var(--muted);margin-bottom:7px}
.cmeta{display:flex;justify-content:space-between;align-items:center}
.cprice{font-weight:600;font-size:14px;color:var(--yellow)}
.cqty{font-size:10px;color:var(--muted);background:rgba(255,255,255,.05);padding:2px 7px;border-radius:7px}
.ccond{font-size:10px;padding:2px 7px;border-radius:7px}
.ccond.NM{color:#4ade80;background:rgba(74,222,128,.1)}
.ccond.GEM{color:#7dcfff;background:rgba(100,180,255,.12)}
.ccond.MINT9{color:#a78bfa;background:rgba(167,139,250,.12)}
.ccond.LP{color:#86efac;background:rgba(134,239,172,.1)}
.ccond.MP{color:#fbbf24;background:rgba(251,191,36,.1)}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;align-items:center;justify-content:center;padding:18px}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:18px;width:560px;max-width:100%;max-height:90vh;overflow-y:auto;padding:26px;position:relative;animation:su .2s ease}
@keyframes su{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.mx{position:absolute;top:15px;right:17px;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;transition:color .15s}
.mx:hover{color:var(--text)}
.mhead{display:flex;gap:16px;align-items:flex-start;margin-bottom:20px}
.mart{width:110px;height:147px;border-radius:10px;overflow:hidden;flex-shrink:0;background:#111;display:flex;align-items:center;justify-content:center;font-size:48px;position:relative}
.mart img{width:100%;height:100%;object-fit:cover;object-position:top}
.mtitle{font-family:var(--fd);font-size:26px;letter-spacing:1px;margin-bottom:3px;line-height:1}
.msub{font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.5}
.mprice{font-size:22px;font-weight:700;color:var(--yellow)}
.drow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.drow:last-child{border-bottom:none}
.dlbl{color:var(--muted)}
.macts{display:flex;gap:9px;margin-top:20px}
.btn-buy{flex:1;padding:12px;border-radius:var(--r);border:none;background:var(--yellow);color:#111;font-family:var(--fb);font-weight:700;font-size:14px;cursor:pointer;transition:opacity .2s}
.btn-buy:hover{opacity:.85}
.btn-tr{flex:1;padding:12px;border-radius:var(--r);border:1px solid rgba(26,111,181,.6);background:transparent;color:#6ab4ff;font-family:var(--fb);font-weight:600;font-size:14px;cursor:pointer;transition:background .2s}
.btn-tr:hover{background:rgba(26,111,181,.15)}
.btn-hrt{width:44px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--muted);font-size:20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.btn-hrt.on{color:#f87171;border-color:rgba(248,113,113,.4)}

/* WISHLIST */
.ptitle{font-family:var(--fd);font-size:32px;letter-spacing:2px;color:var(--yellow);margin-bottom:4px}
.psub{font-size:13px;color:var(--muted);margin-bottom:20px}
.wcard{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;transition:border-color .2s}
.wcard:hover{border-color:var(--border2)}
.wthumb{width:48px;height:64px;border-radius:6px;overflow:hidden;background:#111;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px}
.wthumb img{width:100%;height:100%;object-fit:cover;object-position:top}
.winfo{flex:1;min-width:0}
.wname{font-family:var(--fd);font-size:17px;letter-spacing:.4px}
.wmeta{font-size:11px;color:var(--muted);margin-top:2px}
.wacts{display:flex;gap:7px;flex-shrink:0}
.btn-msg{padding:7px 13px;border-radius:var(--r);border:1px solid rgba(26,111,181,.5);background:transparent;color:#6ab4ff;font-family:var(--fb);font-size:12px;font-weight:500;cursor:pointer;transition:background .2s;white-space:nowrap}
.btn-msg:hover{background:rgba(26,111,181,.15)}
.btn-rm{padding:7px 11px;border-radius:var(--r);border:1px solid rgba(248,113,113,.3);background:transparent;color:#f87171;font-family:var(--fb);font-size:12px;cursor:pointer;transition:background .2s}
.btn-rm:hover{background:rgba(248,113,113,.1)}

/* MESSAGES */
.msglayout{display:grid;grid-template-columns:250px 1fr;gap:13px;height:530px}
.convlist{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;overflow-y:auto}
.convhdr{padding:13px 15px;font-family:var(--fd);font-size:17px;letter-spacing:1px;color:var(--yellow);border-bottom:1px solid var(--border)}
.convitem{display:flex;align-items:center;gap:9px;padding:11px 15px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;border-left:2px solid transparent}
.convitem:hover,.convitem.active{background:var(--ydim)}
.convitem.active{border-left-color:var(--yellow)}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;flex-shrink:0}
.av-b{background:rgba(26,111,181,.3);color:#6ab4ff}
.av-r{background:rgba(227,53,13,.3);color:#ff8070}
.av-g{background:rgba(74,222,128,.2);color:#4ade80}
.av-p{background:rgba(167,139,250,.2);color:#a78bfa}
.av-o{background:rgba(251,191,36,.2);color:#fbbf24}
.convtxt{flex:1;min-width:0}
.convname{font-size:13px;font-weight:500}
.convprev{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.unread{width:8px;height:8px;border-radius:50%;background:var(--yellow);flex-shrink:0}
.chatpane{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;overflow:hidden}
.chattop{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px}
.chatname{font-weight:600;font-size:14px}
.chatstatus{font-size:11px}
.chatmsgs{flex:1;padding:15px;overflow-y:auto;display:flex;flex-direction:column;gap:11px}
.bwrap{display:flex;flex-direction:column}
.bwrap.me{align-items:flex-end}.bwrap.them{align-items:flex-start}
.bubble{max-width:76%;padding:9px 13px;border-radius:15px;font-size:13px;line-height:1.5}
.bubble.them{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
.bubble.me{background:var(--yellow);color:#111;font-weight:500;border-bottom-right-radius:4px}
.btime{font-size:10px;color:var(--muted);margin-top:3px}
.chatfoot{padding:11px 15px;border-top:1px solid var(--border);display:flex;gap:9px;align-items:center}
.chatinput{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:9px 15px;color:var(--text);font-family:var(--fb);font-size:13px;outline:none;transition:border-color .2s}
.chatinput:focus{border-color:var(--yellow)}
.chatinput::placeholder{color:var(--muted)}
.sendbtn{width:38px;height:38px;border-radius:50%;background:var(--yellow);border:none;color:#111;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s}
.sendbtn:hover{opacity:.85}

/* FAB */
.fab{position:fixed;bottom:28px;right:28px;width:52px;height:52px;border-radius:50%;background:var(--yellow);color:#111;border:none;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(255,215,0,.32);transition:transform .2s,box-shadow .2s;z-index:90}
.fab:hover{transform:scale(1.1);box-shadow:0 6px 30px rgba(255,215,0,.52)}

/* ADD FORM */
.flbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:block}
.fctrl{width:100%;background:var(--dark);border:1px solid var(--border);border-radius:var(--r);padding:9px 13px;color:var(--text);font-family:var(--fb);font-size:14px;outline:none;transition:border-color .2s;appearance:none;margin-bottom:12px}
.fctrl:focus{border-color:var(--yellow)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.ftitle{font-family:var(--fd);font-size:28px;letter-spacing:1px;color:var(--yellow);margin-bottom:20px}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted);grid-column:1/-1}
.empty-ico{font-size:48px;margin-bottom:12px}
.empty-t{font-family:var(--fd);font-size:22px;color:var(--text);letter-spacing:1px;margin-bottom:6px}
</style>
</head>
<body>

<nav class="nav">
  <div class="logo">⚡ Nick's PokéHub</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="goPage('catalog')">Catalog</button>
    <button class="nav-tab" onclick="goPage('sealed')">Sealed</button>
    <button class="nav-tab" onclick="goPage('wishlist')">Wishlist</button>
    <button class="nav-tab" onclick="goPage('messages')">Messages</button>
  </div>
  <div class="nav-right">
    <button class="iBtn" onclick="goPage('messages')" title="Messages">💬<span class="badge" id="mbadge">2</span></button>
    <button class="iBtn" onclick="goPage('wishlist')" title="Wishlist">❤️</button>
  </div>
</nav>

<!-- CATALOG -->
<div class="page active main" id="page-catalog">
  <div class="toolbar">
    <input type="text" id="q" placeholder="🔍  Search cards, sets, types…" oninput="renderCards()">
    <button class="pill active" onclick="setF('all',this)">All</button>
    <button class="pill" onclick="setF('sell',this)">For Sale</button>
    <button class="pill" onclick="setF('trade',this)">For Trade</button>
  </div>
  <div class="stats" id="cstats"></div>
  <div class="grid" id="cgrid"></div>
</div>

<!-- SEALED -->
<div class="page main" id="page-sealed">
  <div class="toolbar">
    <input type="text" id="sq" placeholder="🔍  Search sealed products…" oninput="renderSealed()">
  </div>
  <div class="stats" id="sstats"></div>
  <div class="grid" id="sgrid"></div>
</div>

<!-- WISHLIST -->
<div class="page main" id="page-wishlist">
  <div class="ptitle">Wishlist</div>
  <div class="psub">Cards you're hunting — message directly from here</div>
  <div id="wlist"></div>
</div>

<!-- MESSAGES -->
<div class="page main" id="page-messages">
  <div class="ptitle" style="margin-bottom:16px">Messages</div>
  <div class="msglayout">
    <div class="convlist">
      <div class="convhdr">Conversations</div>
      <div id="convitems"></div>
    </div>
    <div class="chatpane">
      <div class="chattop" id="chattop"></div>
      <div class="chatmsgs" id="chatmsgs"></div>
      <div class="chatfoot">
        <input class="chatinput" id="chatin" placeholder="Type a message…" onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="sendbtn" onclick="sendMsg()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- IMAGE FIX OVERLAY -->
<div class="overlay" id="fix-overlay" onclick="if(event.target===this)closeFixImg()">
  <div class="modal" style="width:620px">
    <button class="mx" onclick="closeFixImg()">✕</button>
    <div class="ftitle" style="font-size:22px;margin-bottom:6px">Fix Card Image</div>
    <div id="fix-card-name" style="color:var(--muted);font-size:13px;margin-bottom:16px"></div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <input class="fctrl" id="fix-search" placeholder="Search card name (e.g. Charizard ex)…" style="margin-bottom:0;flex:1" onkeydown="if(event.key==='Enter')searchFixImg()">
      <button class="btn-buy" style="white-space:nowrap;padding:0 18px" onclick="searchFixImg()">Search</button>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:12px">Or paste a pokemontcg.io card ID directly:</div>
    <div style="display:flex;gap:8px;margin-bottom:20px">
      <input class="fctrl" id="fix-manual-id" placeholder="e.g. sv3pt5-199" style="margin-bottom:0;flex:1">
      <button class="btn-buy" style="white-space:nowrap;padding:0 18px" onclick="applyManualId()">Apply</button>
    </div>
    <div id="fix-results" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;max-height:340px;overflow-y:auto"></div>
  </div>
</div>

<!-- DETAIL OVERLAY -->
<div class="overlay" id="doverlay" onclick="if(event.target===this)closeDet()">
  <div class="modal"><button class="mx" onclick="closeDet()">✕</button><div id="dbody"></div></div>
</div>

<!-- ADD OVERLAY -->
<div class="overlay" id="aoverlay" onclick="if(event.target===this)closeAdd()">
  <div class="modal">
    <button class="mx" onclick="closeAdd()">✕</button>
    <div class="ftitle">Add Card to Catalog</div>
    <div class="frow">
      <div><label class="flbl">Card Name</label><input class="fctrl" id="fn" placeholder="e.g. Charizard"></div>
      <div><label class="flbl">Set / Series</label><input class="fctrl" id="fs" placeholder="e.g. Base Set"></div>
    </div>
    <div class="frow">
      <div><label class="flbl">Card Number</label><input class="fctrl" id="fnum" placeholder="e.g. 4/102"></div>
      <div><label class="flbl">Price ($)</label><input class="fctrl" id="fp" type="number" placeholder="e.g. 45.00"></div>
    </div>
    <div class="frow">
      <div><label class="flbl">Condition / Grade</label>
        <select class="fctrl" id="fc">
          <option value="GEM">PSA 10 GEM MT</option>
          <option value="MINT9">PSA 9 MINT</option>
          <option value="NM">Near Mint (NM)</option>
          <option value="LP">Lightly Played (LP)</option>
          <option value="MP">Moderately Played (MP)</option>
        </select>
      </div>
      <div><label class="flbl">Listing Type</label>
        <select class="fctrl" id="ft">
          <option value="sell">For Sale</option>
          <option value="trade">For Trade</option>
          <option value="both">Sale &amp; Trade</option>
        </select>
      </div>
    </div>
    <div class="frow">
      <div><label class="flbl">Grader</label>
        <select class="fctrl" id="fgr">
          <option value="PSA">PSA</option>
          <option value="CGC">CGC</option>
          <option value="BGS">BGS</option>
          <option value="">Ungraded</option>
        </select>
      </div>
      <div><label class="flbl">Grade Score</label><input class="fctrl" id="fgs" placeholder="e.g. 10"></div>
    </div>
    <div><label class="flbl">TCGPlayer Image URL (optional)</label><input class="fctrl" id="fimg" placeholder="https://product-images.tcgplayer.com/..."></div>
    <button class="btn-buy" style="width:100%;margin-top:4px" onclick="submitCard()">Add to Catalog</button>
  </div>
</div>

<button class="fab" id="fab" onclick="openAdd()" title="Add a card">＋</button>

<script>
// ── Pokémon TCG API image fetcher ──
// Images are fetched live from the free pokemontcg.io API using each card's official API ID
const IMG_CACHE = {};
async function fetchCardImg(apiId, fallbackEl) {
  if(IMG_CACHE[apiId]) { fallbackEl.src = IMG_CACHE[apiId]; return; }
  try {
    const r = await fetch(`https://api.pokemontcg.io/v2/cards/${apiId}`);
    const d = await r.json();
    const url = d.data?.images?.large || d.data?.images?.small;
    if(url){ IMG_CACHE[apiId]=url; fallbackEl.src=url; }
  } catch(e){}
}

// ── GRADED CARDS ──
// apiId = official pokemontcg.io card ID (set-number format)
let cards = [

  document.querySelectorAll('.nav-tab')[idx].classList.add('active');
  document.getElementById('fab').style.display = pg==='catalog'?'flex':'none';
  if(pg==='wishlist') renderWish();
  if(pg==='messages'){renderConvs();renderChat(activeConv);}
  if(pg==='sealed') renderSealed();
  if(pg==='catalog') renderCards();
}

// ── CATALOG ──
function setF(f,el){
  cardFilter=f;
  document.querySelectorAll('#page-catalog .pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

function condLabel(c,grader,grade){
  if(grader&&grade) return`${grader} ${grade}`;
  return c;
}

function renderCards(){
  const q=document.getElementById('q').value.toLowerCase();
  const vis=cards.filter(c=>{
    const mf=cardFilter==='all'||c.type===cardFilter||(cardFilter!=='all'&&c.type==='both');
    const ms=!q||c.name.toLowerCase().includes(q)||c.set.toLowerCase().includes(q);
    return mf&&ms;
  });
  const totalVal=cards.reduce((s,c)=>s+c.price*c.qty,0);
  const graded=cards.filter(c=>c.grader).length;
  document.getElementById('cstats').innerHTML=
    `<div class="stat"><strong>${cards.length}</strong> Cards</div>
     <div class="stat"><strong>${graded}</strong> Graded</div>`;
  const grid=document.getElementById('cgrid');
  if(!vis.length){grid.innerHTML='<div class="empty"><div class="empty-ico">🔍</div><div class="empty-t">No cards found</div></div>';return;}
  grid.innerHTML=vis.map(c=>{
    const slbl=c.type==='sell'?'For Sale':c.type==='trade'?'For Trade':'Sale & Trade';
    const scls=c.type==='sell'?'s-sell':c.type==='trade'?'s-trade':'s-both';
    const cls=c.grader?'graded':'';
    const cLabel=c.grader?`${c.grader} ${c.grade}`:(c.cond==='NM'?'NM':c.cond);
    const ccls=c.grader?(c.grade===10?'GEM':'MINT9'):c.cond;
    return`<div class="pcard ${cls}" onclick="openDet(${c.id},'card')">
      <div class="cimg">
        <img data-apiid="${c.apiId}" alt="${c.name}" style="width:100%;height:100%;object-fit:cover;object-position:top" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="fallback" style="display:none">🃏</div>
        ${c.grader?`<div class="grade-badge">${c.grader}<span class="grade-score">${c.grade}</span></div>`:''}
        <span class="sticker ${scls}">${slbl}</span>
      </div>
      <div class="cinfo">
        <div class="cname">${c.name}</div>
        <div class="cset">${c.set} · ${c.num}</div>
        <div class="cmeta">
          <span class="cprice">$${c.price.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
          <span class="ccond ${ccls}">${cLabel}</span>
        </div>
        ${c.qty>1?`<div style="margin-top:5px"><span class="cqty">Qty: ${c.qty}</span></div>`:''}
      </div>
    </div>`;
  }).join('');
  setTimeout(lazyLoad, 50);
}

// ── SEALED ──
function renderSealed(){
  const q=document.getElementById('sq').value.toLowerCase();
  const vis=sealed.filter(s=>!q||s.name.toLowerCase().includes(q)||s.set.toLowerCase().includes(q));
  const totalVal=sealed.reduce((s,p)=>s+p.price*p.qty,0);
  const totalQty=sealed.reduce((s,p)=>s+p.qty,0);
  document.getElementById('sstats').innerHTML=
    `<div class="stat"><strong>${sealed.length}</strong> Products</div>
     <div class="stat"><strong>${totalQty}</strong> Total Units</div>`;
  const grid=document.getElementById('sgrid');
  if(!vis.length){grid.innerHTML='<div class="empty"><div class="empty-ico">📦</div><div class="empty-t">No products found</div></div>';return;}
  grid.innerHTML=vis.map(s=>
    `<div class="pcard sealed" onclick="openDet(${s.id},'sealed')">
      <div class="cimg" style="aspect-ratio:3/4">
        <img src="${s.img}" alt="${s.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" style="width:100%;height:100%;object-fit:contain;padding:8px;background:#111">
        <div class="fallback" style="display:none">📦</div>
        <span class="sticker s-sealed">Sealed</span>
      </div>
      <div class="cinfo">
        <div class="cname">${s.name}</div>
        <div class="cset">${s.set}</div>
        <div class="cmeta">
          <span class="cprice">$${s.price.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
          <span class="cqty">Qty: ${s.qty}</span>
        </div>
      </div>
    </div>`
  ).join('');
}

// ── DETAIL ──
function openDet(id,kind){
  const item = kind==='card' ? cards.find(c=>c.id===id) : sealed.find(s=>s.id===id);
  if(!item) return;
  const wished=wishlist.some(w=>w.id===id&&w.kind===kind);
  let body='';
  if(kind==='card'){
    const slbl=item.type==='sell'?'For Sale':item.type==='trade'?'For Trade':'Sale & Trade';
    const gradeStr=item.grader?`${item.grader} ${item.grade} ${item.cond==='GEM'?'GEM MT':item.cond==='MINT9'?'MINT':''}`:item.cond;
    let acts='';
    if(item.type==='sell'||item.type==='both') acts+=`<button class="btn-buy" onclick="initBuy(${id},'${item.name}',${item.price})">Buy Now — $${item.price.toLocaleString('en-US',{minimumFractionDigits:2})}</button>`;
    if(item.type==='trade'||item.type==='both') acts+=`<button class="btn-tr" onclick="initTrade(${id},'${item.name}')">📨 Offer Trade</button>`;
    acts+=`<button class="btn-hrt${wished?' on':''}" id="hb${id}-card" onclick="toggleWish(${id},'card')" title="Wishlist">♥</button>`;
    const fixBtn=`<button onclick="openFixImg(${item.id},'card','${item.name.replace(/'/g,"\\'")}');closeDet()" style="width:100%;margin-top:10px;padding:9px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--fb);font-size:12px;cursor:pointer">🖼 Wrong image? Fix it</button>`;
    body=`<div class="mhead">
      <div class="mart">
        <img data-apiid="${item.apiId}" alt="${item.name}" style="width:100%;height:100%;object-fit:cover;object-position:top" onerror="this.style.display='none'">
        ${item.grader?`<div class="grade-badge" style="position:absolute;top:5px;left:5px">${item.grader}<span class="grade-score">${item.grade}</span></div>`:''}
      </div>
      <div>
        <div class="mtitle">${item.name}</div>
        <div class="msub">${item.set}<br>${item.num}${item.grader?' · ✨ Holofoil':''}</div>
        <div class="mprice">$${item.price.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
      </div>
    </div>
    <div>
      <div class="drow"><span class="dlbl">Grade</span><span>${gradeStr}</span></div>
      <div class="drow"><span class="dlbl">Set</span><span>${item.set}</span></div>
      <div class="drow"><span class="dlbl">Card Number</span><span>${item.num}</span></div>
      <div class="drow"><span class="dlbl">Listing</span><span>${slbl}</span></div>
      <div class="drow"><span class="dlbl">Quantity Available</span><span>${item.qty}</span></div>
    </div>
    <div class="macts">${acts}</div>
    ${fixBtn}`;
  } else {
    const sealedActs=`<button class="btn-buy" onclick="initBuy(${id},'${item.name}',${item.price})">Buy Now — $${item.price.toLocaleString('en-US',{minimumFractionDigits:2})}</button>
      <button class="btn-tr" onclick="initTrade(${id},'${item.name}')">📨 Make Offer</button>
      <button class="btn-hrt${wished?' on':''}" id="hb${id}-sealed" onclick="toggleWish(${id},'sealed')" title="Wishlist">♥</button>`;
    body=`<div class="mhead">
      <div class="mart"><img src="${item.img}" alt="${item.name}" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:contain;padding:6px"></div>
      <div>
        <div class="mtitle">${item.name}</div>
        <div class="msub">${item.set}</div>
        <div class="mprice">$${item.price.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
      </div>
    </div>
    <div>
      <div class="drow"><span class="dlbl">Condition</span><span>🟢 Factory Sealed</span></div>
      <div class="drow"><span class="dlbl">Set</span><span>${item.set}</span></div>
      <div class="drow"><span class="dlbl">Quantity Available</span><span>${item.qty}</span></div>
    </div>
    <div class="macts">${sealedActs}</div>`;
  }
  document.getElementById('dbody').innerHTML=body;
  document.getElementById('doverlay').classList.add('open');
  setTimeout(lazyLoad,50);
}
function closeDet(){document.getElementById('doverlay').classList.remove('open');}

function initBuy(id,name,price){
  closeDet();goPage('messages');
  setTimeout(()=>{document.getElementById('chatin').value=`Hi! I'd like to buy your ${name} for $${price.toFixed(2)}. Is it still available?`;document.getElementById('chatin').focus();},150);
}
function initTrade(id,name){
  closeDet();goPage('messages');
  setTimeout(()=>{document.getElementById('chatin').value=`Hi! I'm interested in trading for your ${name}. What are you looking for in return?`;document.getElementById('chatin').focus();},150);
}

// ── WISHLIST ──
function toggleWish(id,kind){
  const pool=kind==='card'?cards:sealed;
  const item=pool.find(x=>x.id===id);
  const idx=wishlist.findIndex(w=>w.id===id&&w.kind===kind);
  if(idx>=0) wishlist.splice(idx,1); else wishlist.push({...item,kind});
  const btn=document.getElementById(`hb${id}-${kind}`);
  if(btn) btn.classList.toggle('on',wishlist.some(w=>w.id===id&&w.kind===kind));
}
function removeWish(id,kind){wishlist=wishlist.filter(w=>!(w.id===id&&w.kind===kind));renderWish();}
function renderWish(){
  const el=document.getElementById('wlist');
  if(!wishlist.length){el.innerHTML='<div class="empty"><div class="empty-ico">❤️</div><div class="empty-t">Wishlist is empty</div><div>Heart any card or sealed product to track it here</div></div>';return;}
  el.innerHTML=wishlist.map(w=>`
    <div class="wcard">
      <div class="wthumb"><img src="${w.img}" alt="${w.name}" onerror="this.style.display='none'"></div>
      <div class="winfo">
        <div class="wname">${w.name}</div>
        <div class="wmeta">${w.set}${w.num?' · '+w.num:''} · $${w.price.toLocaleString('en-US',{minimumFractionDigits:2})}</div>
      </div>
      <div class="wacts">
        <button class="btn-msg" onclick="contactAbout('${w.name}')">Message Seller</button>
        <button class="btn-rm" onclick="removeWish(${w.id},'${w.kind}')">Remove</button>
      </div>
    </div>`).join('');
}
function contactAbout(name){
  goPage('messages');
  setTimeout(()=>{document.getElementById('chatin').value=`Hey, I'm interested in your ${name} listing!`;document.getElementById('chatin').focus();},150);
}

// ── MESSAGES ──
function renderConvs(){
  document.getElementById('convitems').innerHTML=convs.map((c,i)=>`
    <div class="convitem${i===activeConv?' active':''}" onclick="switchConv(${i})">
      <div class="av ${c.av}">${c.init}</div>
      <div class="convtxt">
        <div class="convname">${c.name}</div>
        <div class="convprev">${c.msgs[c.msgs.length-1].text}</div>
      </div>
      ${unread.has(i)?'<div class="unread"></div>':''}
    </div>`).join('');
}
function switchConv(i){activeConv=i;unread.delete(i);updateBadge();renderConvs();renderChat(i);}
function updateBadge(){const b=document.getElementById('mbadge');b.textContent=unread.size;b.style.display=unread.size?'flex':'none';}
function renderChat(i){
  const c=convs[i];
  document.getElementById('chattop').innerHTML=`<div class="av ${c.av}">${c.init}</div><div><div class="chatname">${c.name}</div><div class="chatstatus" style="color:${c.color}">● ${c.status}</div></div>`;
  const msgs=document.getElementById('chatmsgs');
  msgs.innerHTML=c.msgs.map(m=>`<div class="bwrap ${m.from}"><div class="bubble ${m.from}">${m.text}</div><div class="btime">${m.time}</div></div>`).join('');
  msgs.scrollTop=msgs.scrollHeight;
}
function sendMsg(){
  const inp=document.getElementById('chatin');const txt=inp.value.trim();if(!txt)return;
  convs[activeConv].msgs.push({from:'me',text:txt,time:'Just now'});
  inp.value='';renderConvs();renderChat(activeConv);
}

// ── ADD CARD ──
function openAdd(){document.getElementById('aoverlay').classList.add('open')}
function closeAdd(){document.getElementById('aoverlay').classList.remove('open')}
function submitCard(){
  const name=document.getElementById('fn').value.trim();
  const set=document.getElementById('fs').value.trim();
  const num=document.getElementById('fnum').value.trim();
  const price=parseFloat(document.getElementById('fp').value)||0;
  const cond=document.getElementById('fc').value;
  const type=document.getElementById('ft').value;
  const grader=document.getElementById('fgr').value;
  const grade=parseInt(document.getElementById('fgs').value)||null;
  const apiId=document.getElementById('fimg').value.trim()||'';
  if(!name){alert('Please enter a card name.');return;}
  cards.unshift({id:Date.now(),name,set:set||'Unknown Set',num:num||'—',cond,price,type,grader,grade,apiId,qty:1});
  closeAdd();['fn','fs','fnum','fp','fgs','fimg'].forEach(id=>document.getElementById(id).value='');
  renderCards();
}

// ── IMAGE FIX TOOL ──
let fixTargetId = null;
let fixTargetKind = 'card';

function openFixImg(id, kind, name) {
  fixTargetId = id; fixTargetKind = kind;
  document.getElementById('fix-card-name').textContent = `Fixing image for: ${name}`;
  document.getElementById('fix-search').value = name;
  document.getElementById('fix-manual-id').value = '';
  document.getElementById('fix-results').innerHTML = '';
  document.getElementById('fix-overlay').classList.add('open');
  searchFixImg();
}
function closeFixImg(){ document.getElementById('fix-overlay').classList.remove('open'); }

async function searchFixImg() {
  const q = document.getElementById('fix-search').value.trim();
  if(!q) return;
  const res = document.getElementById('fix-results');
  res.innerHTML = '<div style="color:var(--muted);font-size:13px;grid-column:1/-1;padding:20px 0;text-align:center">Searching…</div>';
  try {
    const r = await fetch(`https://api.pokemontcg.io/v2/cards?q=name:"${encodeURIComponent(q)}"&pageSize=20&orderBy=-set.releaseDate`);
    const d = await r.json();
    if(!d.data||!d.data.length){ res.innerHTML='<div style="color:var(--muted);font-size:13px;grid-column:1/-1;padding:20px 0;text-align:center">No results — try a different name</div>'; return; }
    res.innerHTML = d.data.map(c => {
      const img = c.images?.large || c.images?.small || '';
      return `<div onclick="applyFixImg('${c.id}','${img}')" style="cursor:pointer;border-radius:8px;border:1px solid var(--border);overflow:hidden;background:var(--card-bg);transition:border-color .15s" onmouseover="this.style.borderColor='rgba(255,215,0,.6)'" onmouseout="this.style.borderColor='var(--border)'">
        <img src="${img}" style="width:100%;aspect-ratio:3/4;object-fit:cover;display:block" alt="${c.name}">
        <div style="padding:5px 6px;font-size:10px;color:var(--muted);line-height:1.3">${c.name}<br><span style="color:var(--yellow);font-size:9px">${c.set?.name||''} · ${c.number||''}</span></div>
      </div>`;
    }).join('');
  } catch(e) {
    res.innerHTML = '<div style="color:#f87171;font-size:13px;grid-column:1/-1;padding:20px 0;text-align:center">Search failed — check your connection</div>';
  }
}

function applyManualId() {
  const id = document.getElementById('fix-manual-id').value.trim();
  if(!id) return;
  fetchCardImg(id, null, true).then(url => { if(url) applyFixImg(id, url); });
}

async function fetchCardImg(apiId, imgEl, returnUrl=false) {
  if(IMG_CACHE[apiId]) {
    if(imgEl) imgEl.src = IMG_CACHE[apiId];
    if(returnUrl) return IMG_CACHE[apiId];
    return;
  }
  try {
    const r = await fetch(`https://api.pokemontcg.io/v2/cards/${apiId}`);
    const d = await r.json();
    const url = d.data?.images?.large || d.data?.images?.small;
    if(url){ IMG_CACHE[apiId]=url; if(imgEl) imgEl.src=url; if(returnUrl) return url; }
  } catch(e){ if(returnUrl) return null; }
}

function applyFixImg(apiId, imgUrl) {
  // Update the card/sealed data
  const pool = fixTargetKind==='card' ? cards : sealed;
  const item = pool.find(x=>x.id===fixTargetId);
  if(item){ item.apiId=apiId; IMG_CACHE[apiId]=imgUrl; }
  closeFixImg();
  // Refresh the right page
  if(fixTargetKind==='card') renderCards(); else renderSealed();
  // Re-open detail if it was open
}

function lazyLoad() {
  document.querySelectorAll('img[data-apiid]:not([data-loaded])').forEach(img => {
    img.dataset.loaded = '1';
    fetchCardImg(img.dataset.apiid, img);
  });
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDet();closeAdd();closeFixImg();}});
document.getElementById('doverlay').addEventListener('click',e=>{if(e.target===document.getElementById('doverlay'))closeDet();});
document.getElementById('aoverlay').addEventListener('click',e=>{if(e.target===document.getElementById('aoverlay'))closeAdd();});

// ── INIT ──
renderCards();
updateBadge();
</script>
</body>
